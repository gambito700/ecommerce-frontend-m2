<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle del producto -- BALENCIAGA VOID. Informacion completa, selector de cantidad y acceso directo al carrito.">
  <meta name="theme-color" content="#000000">
  <title>Detalle del Producto -- BALENCIAGA VOID</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============================================================
       NAVBAR
       ============================================================ -->
  <header class="bv-navbar">
    <nav class="container-fluid d-flex align-items-center justify-content-between" aria-label="Navegacion principal">
      <a class="bv-logo" href="index.html">BALENCIAGA VOID</a>
      <ul class="bv-nav-links d-none d-md-flex list-unstyled m-0">
        <li><a href="index.html">INICIO</a></li>
        <li><a href="cart.html">CARRITO <span class="badge bv-badge cart-count-badge">0</span></a></li>
        <li><a href="index.html#contacto">CONTACTO</a></li>
        <li><button id="themeToggle" class="btn-theme-toggle"><img src="diseno/boton-dia.png" alt="Toggle Theme"></button></li>
      </ul>
      <button class="bv-hamburger d-md-none" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>
    <!-- Menu mobile -->
    <div class="bv-mobile-menu" id="mobileMenu" aria-hidden="true">
      <ul class="list-unstyled">
        <li><a href="index.html">INICIO</a></li>
        <li><a href="cart.html">CARRITO <span class="badge bv-badge cart-count-badge">0</span></a></li>
        <li><a href="index.html#contacto">CONTACTO</a></li>
        <li><button id="themeToggleMobile" class="btn-theme-toggle w-100 mt-2"><img src="diseno/boton-dia.png" alt="Toggle Theme"></button></li>
      </ul>
    </div>
  </header>

  <!-- ============================================================
       CONTENIDO PRINCIPAL -- Detalle del producto
       ============================================================ -->
  <main>
    <article class="bv-container py-5">
      <div class="row g-4">
        <!-- Imagen del producto -->
        <div class="col-md-6">
          <img id="detail-img" src="" alt="Imagen del producto" class="img-fluid">
        </div>
        <!-- Informacion del producto -->
        <div class="col-md-6">
          <p class="bv-eyebrow">BALENCIAGA VOID</p>
          <h1 id="detail-name" class="bv-section-title mb-3"></h1>
          <p id="detail-price" class="fs-4 fw-bold mb-3"></p>
          <div id="detail-description" class="mb-4">
            <!-- Descripcion renderizada por JS -->
          </div>

          <!-- Selector de talla -->
          <div class="mb-3">
            <label for="size-select" class="form-label">Talla</label>
            <select id="size-select" class="form-select w-50">
              <option value="S">S</option>
              <option value="M" selected>M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
            </select>
          </div>

          <!-- Selector de cantidad -->
          <div class="mb-4">
            <label class="form-label">Cantidad</label>
            <div class="bv-qty-wrapper">
              <button class="bv-qty-btn" id="qtyMinus" aria-label="Disminuir cantidad">-</button>
              <span class="bv-qty-display" id="qtyDisplay">1</span>
              <button class="bv-qty-btn" id="qtyPlus" aria-label="Aumentar cantidad">+</button>
            </div>
          </div>

          <!-- Acciones -->
          <button id="add-to-cart" class="btn btn-dark btn-lg w-100 mb-3">AGREGAR AL CARRITO</button>
          <a href="index.html" class="btn btn-outline-dark w-100">VOLVER A LA TIENDA</a>
        </div>
      </div>
    </article>
  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="bv-footer">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <span class="bv-footer-logo">BALENCIAGA VOID</span>
      <span class="bv-footer-copy">2026 BALENCIAGA VOID. TODOS LOS DERECHOS RESERVADOS.</span>
      <span class="bv-footer-tagline">SS 2026 -- CONCEPT BOUTIQUE</span>
    </div>
  </footer>

  <!-- Toast container -->
  <div class="bv-toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
